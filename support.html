<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support – TierMaker</title>
  <style>
    :root { --bg: #0f0f0f; --text: #e8e8e8; --muted: #888; --accent: #6b9fff; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 2rem 1.5rem; max-width: 42rem; margin-left: auto; margin-right: auto; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-top: 0; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-top: 2rem; color: var(--text); }
    p, li { color: var(--muted); margin: 0.5rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .app-name { color: var(--text); }
    .card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 1.25rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1 class="app-name">TierMaker</h1>
  <h2>Support</h2>

  <p>Need help or want to send feedback? Here’s how to reach us.</p>

  <div class="card">
    <h2>GitHub Issues</h2>
    <p>Report bugs, suggest features, or ask questions by opening an issue:</p>
    <p><a href="https://github.com/chunseth/TierMaker/issues" target="_blank" rel="noopener">github.com/chunseth/TierMaker/issues</a></p>
  </div>

  <h2>Privacy &amp; legal</h2>
  <p>Our <a href="index.html">Privacy Policy</a> explains how we handle your data.</p>
</body>
</html>
